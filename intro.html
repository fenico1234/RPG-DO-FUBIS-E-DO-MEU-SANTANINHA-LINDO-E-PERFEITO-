<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intro</title>

<style>
body {
    margin: 0;
    background: black;
    overflow: hidden;
}

video {
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    position: fixed;
}

#start {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    background: rgba(0,0,0,0.7);
    font-family: Arial;
    cursor: pointer;
    z-index: 10;
}
</style>
</head>

<body>

<div id="start">CLIQUE PARA INICIAR</div>

<video id="video" playsinline>
    <source src="https://pub-1407f82391df4ab1951418d04be76914.r2.dev/uploads/2bfa70ae-7be4-4552-969a-789acd6a9eea.mp4">
</video>

<script>
const video = document.getElementById("video");
const start = document.getElementById("start");

start.onclick = async () => {
    start.style.display = "none";

    try {
        video.volume = 1;
        await video.play();
    } catch (e) {
        console.log("Erro autoplay:", e);
    }

    setTimeout(() => {
        window.location.href = "./loading.html";
    }, 30000);
};
</script>

</body>
</html>
